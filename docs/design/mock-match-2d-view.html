<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試合ビュー（2D俯瞰）再生モック</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#14231B; --panel:#1D3227; --line:#38543F;
    --chalk:#EFF4EA; --chalk-dim:#9DB3A0; --lamp:#F5C64A; --alert:#E86A4A;
    --grass:#1C3126; --grass2:#22392B; --dirt:#57452F;
    --num:'Oswald','Arial Narrow',sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --jp:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--field);color:var(--chalk);font-family:var(--jp);font-size:14px;padding:16px 14px 40px}
  .wrap{max-width:860px;margin:0 auto}
  h1{font-size:15px;letter-spacing:.18em;font-weight:700}
  .sub{font-size:11.5px;color:var(--chalk-dim);margin:4px 0 12px}

  .stage{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px}
  canvas{display:block;width:100%;height:auto;border-radius:6px;background:var(--grass)}

  .caption{
    margin-top:10px;background:#0E1A13;border:1px solid var(--line);border-radius:6px;
    padding:9px 12px;font-size:13.5px;min-height:40px;display:flex;align-items:center;gap:10px;
  }
  .caption .res{
    font-family:var(--num);font-size:12px;letter-spacing:.1em;color:#101408;background:var(--lamp);
    border-radius:4px;padding:1px 8px;white-space:nowrap;visibility:hidden;
  }
  .caption .res.show{visibility:visible}

  .ctrl{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
  .ctrl .grp{display:flex;gap:6px;flex-wrap:wrap}
  button{
    background:#0E1A13;color:var(--chalk);border:1px solid var(--line);border-radius:5px;
    padding:8px 12px;font-size:12.5px;cursor:pointer;font-family:var(--jp);
  }
  button:hover{border-color:var(--chalk-dim)}
  button:focus-visible{outline:2px solid var(--lamp);outline-offset:1px}
  button.on{background:var(--lamp);color:#1A1608;border-color:var(--lamp);font-weight:700}
  button.replay{color:var(--lamp);letter-spacing:.1em}
  .spd{font-family:var(--mono)}

  .legend{margin-top:12px;font-size:11.5px;color:var(--chalk-dim);line-height:1.8}
  .legend b{color:var(--chalk);font-weight:600}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:-1px;margin-right:3px}
</style>
</head>
<body>
<div class="wrap">
  <h1>試合ビュー — 2D俯瞰 再生モック</h1>
  <div class="sub">エンジンが出力する「タイムライン付きプレーデータ」をUIが再生するだけ、を体感するためのモック。物理計算はすべて事前計算済みという想定です。</div>

  <div class="stage">
    <canvas id="cv" width="760" height="520" aria-label="野球フィールドの俯瞰図"></canvas>
    <div class="caption"><span class="res" id="res"></span><span id="cap">プレーを選択してください</span></div>
    <div class="ctrl">
      <div class="grp" id="plays"></div>
      <div class="grp">
        <button class="replay" id="replay">▶ もう一度</button>
        <button class="spd" data-s="0.5">×0.5</button>
        <button class="spd on" data-s="1">×1</button>
        <button class="spd" data-s="2">×2</button>
      </div>
    </div>
  </div>

  <div class="legend">
    <b>見方:</b>
    <span class="dot" style="background:#fff"></span>ボール ／
    <span class="dot" style="background:#000;opacity:.55"></span>影 — <b>ボールと影が離れているほど高い打球</b> ／
    白枠の丸＝守備（動いている野手は黄枠）／
    <span class="dot" style="background:var(--lamp)"></span>走者。
    ※データ・演出は架空。守備位置・到達時刻はエンジン側で確定済みという前提の再生デモです。
  </div>
</div>

<script>
"use strict";
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const capEl = document.getElementById('cap'), resEl = document.getElementById('res');

/* ---------- 座標系: メートル → ピクセル（本塁が下中央） ---------- */
const S = 3.35, CX = 380, OY = 492;
const px = p => [CX + p[0]*S, OY - p[1]*S];

/* ---------- 固定ジオメトリ ---------- */
const HOME=[0,0], FIRST=[19.4,19.4], SECOND=[0,38.8], THIRD=[-19.4,19.4], MOUND=[0,18.4];
const DEF = { 投:[0,17.4], 捕:[0,-2.2], 一:[22,26], 二:[14,38], 三:[-22,26], 遊:[-14,38],
              左:[-36,76], 中:[0,92], 右:[36,76] };

/* ---------- セグメント生成ヘルパ ---------- */
const easeIO = u => u<0?0:u>1?1:u*u*(3-2*u);
function pitchSeg(t0){ // 投球: マウンド→本塁
  const dur=0.45;
  return {t0, t1:t0+dur, at(tt){const u=tt/dur;
    return {x:0, y:17.4-16.6*u, h:1.7-1.1*u};}};
}
function arcSeg(t0,x0,y0,h0,vx,vy,vz,tEnd){ // 放物線（tEnd指定で捕球打ち切り）
  const tg=(vz+Math.sqrt(vz*vz+2*9.8*h0))/9.8, dur=Math.min(tEnd??tg,tg);
  return {t0,t1:t0+dur,at(tt){return {x:x0+vx*tt,y:y0+vy*tt,h:Math.max(0,h0+vz*tt-4.9*tt*tt)};}};
}
function rollSeg(t0,x0,y0,dx,dy,v0,a,dur,hop){ // ゴロ/バウンド
  return {t0,t1:t0+dur,at(tt){const d=Math.max(0,v0*tt+0.5*a*tt*tt);
    const h=hop?Math.max(0,hop*Math.abs(Math.sin(6*tt))*Math.exp(-1.4*tt)):0;
    return {x:x0+dx*d,y:y0+dy*d,h};}};
}
function throwSeg(t0,from,to,spd){ // 送球
  const dx=to[0]-from[0],dy=to[1]-from[1],dist=Math.hypot(dx,dy),dur=dist/spd;
  return {t0,t1:t0+dur,at(tt){const u=tt/dur;
    return {x:from[0]+dx*u,y:from[1]+dy*u,h:1.7+ (dist/9)*4*u*(1-u)};}};
}
const move = (t0,t1,to) => ({t0,t1,to});
const run  = (t0,t1,from,to) => ({t0,t1,from,to});

/* ---------- 3つのプレーデータ（＝エンジン出力の想定） ---------- */
const PLAYS = [
{ name:"① レフト前ヒット", dur:6.3, result:"H  レフト前",
  ball:[ pitchSeg(0.40),
         arcSeg(0.85, 0,0.6,1.0, -14.75,31.63,8.7),          // 打球（着地 t≈2.73）
         rollSeg(2.73,-27.7,60.1,-0.4226,0.9063,15,-6,1.12,0.5), // バウンド→左翼手が捕球
         throwSeg(4.25,[-33.2,71.9],[0.5,38.8],30) ],          // 返球→二塁
  moves:{ 左:[move(1.20,3.85,[-33.2,71.9])], 二:[move(1.50,3.50,[0.5,38.8])] },
  runners:[ {segs:[run(0.95,5.15,HOME,FIRST)]} ],
  caps:[ [0.05,"ピッチャー、振りかぶって…"], [0.86,"カキーン！ 鋭い打球がレフトへ"],
         [2.75,"ワンバウンド、レフトが前へチャージ"], [3.90,"レフト前ヒット！ 打者は一塁へ"] ],
  resAt:3.90 },

{ name:"② センターフライ", dur:5.6, result:"F8  中飛",
  ball:[ pitchSeg(0.40),
         arcSeg(0.85, 0,0.6,1.0, 1.31,25.07,18.2, 3.60) ],     // 滞空3.6秒で捕球
  moves:{ 中:[move(1.30,4.35,[4.7,91.0])] },
  runners:[ {segs:[run(0.95,4.45,HOME,FIRST)], hideAt:4.75} ],
  caps:[ [0.05,"ピッチャー、投げた"], [0.86,"打ち上げた！ センターへ高いフライ"],
         [2.60,"センター、落下点へ入る"], [4.47,"キャッチ。バッターアウト！"] ],
  resAt:4.47 },

{ name:"③ ショートゴロ 6-3", dur:5.4, result:"6-3  遊ゴロ",
  ball:[ pitchSeg(0.40),
         rollSeg(0.85, 0,0.6, -0.2079,0.9781, 30,-5, 1.33, 0.6), // ゴロ→遊撃手が捕球
         throwSeg(2.55,[-7.5,35.8],[19.6,19.6],32) ],            // 一塁送球
  moves:{ 遊:[move(1.05,2.18,[-7.5,35.8])], 一:[move(1.20,2.60,[19.6,19.6])] },
  runners:[ {segs:[run(0.95,5.10,HOME,FIRST)], hideAt:4.00} ],
  caps:[ [0.05,"ピッチャー、投げた"], [0.86,"叩きつけた！ ショートの左へ"],
         [2.20,"ショート、回り込んで捕った"], [2.58,"一塁へ送球…"], [3.55,"アウト！ 6-3"] ],
  resAt:3.55 },

{ name:"④ ショートがファンブル！", dur:5.9, result:"E6  失策",
  ball:[ pitchSeg(0.40),
         rollSeg(0.85, 0,0.6, -0.2079,0.9781, 30,-5, 1.33, 0.6), // ③と同じゴロ、だが…
         arcSeg(2.18, -7.5,35.8, 0.6, 1.2,-1.5, 2.4),            // ファンブルで小さく弾く
         throwSeg(3.60,[-6.7,34.8],[19.6,19.6],30) ],            // 拾い直して慌てて送球
  moves:{ 遊:[move(1.05,2.18,[-7.5,35.8]), move(2.30,3.40,[-6.7,34.8])],
          一:[move(1.20,2.60,[19.6,19.6])] },
  runners:[ {segs:[run(0.95,4.55,HOME,FIRST)]} ],                 // 俊足、間一髪セーフ
  caps:[ [0.05,"ピッチャー、投げた"], [0.86,"叩きつけた！ ショート正面"],
         [2.20,"捕り損ねた！ お手玉している…"], [3.62,"拾って一塁へ、間に合うか——"],
         [4.63,"セーフ！ 記録はエラー（E6）"] ],
  resAt:4.63 },

{ name:"⑤ 6-4-3 ダブルプレー", dur:5.6, result:"6-4-3  併殺",
  ball:[ pitchSeg(0.40),
         rollSeg(0.85, 0,0.6, -0.292,0.956, 32,-5, 1.29, 0.55),  // 鋭いゴロがショートへ
         throwSeg(2.45,[-10.8,36.1],[0.4,38.8],25),              // ショート→二塁トス
         throwSeg(3.26,[0.4,38.8],[19.6,19.6],31) ],             // 二塁手が反転、一塁転送
  moves:{ 遊:[move(1.00,2.14,[-10.8,36.1])],
          二:[move(1.00,2.80,[0.4,38.8])],   // 二塁ベースカバー
          一:[move(1.20,2.60,[19.6,19.6])],  // 一塁ベースへ
          中:[move(1.30,3.40,[2,62])],       // 二塁送球のバックアップ
          右:[move(1.50,4.10,[29,13])] },    // 一塁送球のバックアップ
  runners:[ {label:"走", segs:[run(0.0,0.85,FIRST,FIRST), run(0.85,4.35,FIRST,SECOND)], hideAt:3.25},
            {label:"打", segs:[run(0.95,5.15,HOME,FIRST)], hideAt:4.55} ],
  caps:[ [0.05,"一塁に走者。ピッチャー投げた"], [0.86,"ゴロだ！ ショート正面——併殺コースか"],
         [2.16,"ショート捕って二塁へトス"], [2.93,"一つアウト！ 二塁手が反転、一塁へ転送——"],
         [4.16,"ダブルプレー成立！！ 6-4-3"] ],
  resAt:4.16 },

{ name:"⑥ 右中間破る長打→中継バックホーム", dur:10.8, result:"9-4-2  本塁憤死",
  ball:[ pitchSeg(0.40),
         arcSeg(0.85, 0,0.6,1.0, 12.31,33.84,8.0),               // 右中間へのライナー
         rollSeg(2.60, 21.6,59.9, 0.342,0.940, 15,-4, 2.90, 0.4),// 転々、ライトが追う
         throwSeg(6.10,[30.7,85.0],[20,55],31),                  // ライト→中継（二塁手）
         throwSeg(7.50,[20,55],[0,1.0],33) ],                    // 中継→バックホーム
  moves:{ 右:[move(1.20,5.50,[30.7,85.0])],
          中:[move(1.30,5.90,[25.5,90])],    // ライトの後ろへカバー
          二:[move(1.30,5.00,[20,55])],      // 中継（カットマン）に出る
          遊:[move(1.40,3.20,[0.4,38.8])],   // 二塁ベースカバー
          一:[move(1.30,2.80,[19.6,19.6])],
          投:[move(6.30,8.30,[-2.5,-7.5])] },// 本塁バックアップに走る
  runners:[ {label:"走", segs:[run(0.0,0.85,FIRST,FIRST), run(0.85,3.85,FIRST,SECOND),
                               run(3.85,6.85,SECOND,THIRD), run(6.85,9.85,THIRD,HOME)], hideAt:9.75},
            {label:"打", segs:[run(0.95,4.55,HOME,FIRST), run(4.55,7.90,FIRST,SECOND)]} ],
  caps:[ [0.05,"一塁に走者"], [0.86,"痛烈！ 右中間を破った！"],
         [2.65,"一塁走者は二塁を蹴った。センターがカバーに走る"],
         [5.55,"ライトが追いつく。セカンドが中継に出た"],
         [7.52,"三塁を回った！ バックホーム——！！"],
         [9.30,"本塁タッチアウト！ 中継プレーが刺した！"] ],
  resAt:9.30 },

{ name:"⑦ 一・二塁から送りバント", dur:5.4, result:"犠打  成功",
  ball:[ pitchSeg(0.40),
         rollSeg(0.85, 0,0.6, 0.342,0.940, 7,-2.5, 1.60, 0.15),  // 一塁側へ弱いゴロ
         throwSeg(2.85,[2.7,8.1],[19.6,19.6],28) ],              // ファースト→一塁カバーの二塁手
  moves:{ 一:[move(1.00,2.45,[2.7,8.1])],    // 猛チャージ
          投:[move(1.00,2.20,[1.8,11.5])],   // 投手もチャージ（一塁手に譲る）
          捕:[move(1.10,2.00,[0.6,1.8])],    // 前に出て指示
          二:[move(1.00,2.90,[19.6,19.6])],  // 一塁ベースカバーへ回る
          遊:[move(1.00,2.80,[0.2,38.8])],   // 二塁ベースカバー
          三:[move(1.00,1.80,[-19.4,19.4])], // 三塁ベースに張り付く
          右:[move(1.30,3.60,[29.5,14])] },  // 一塁送球のバックアップ
  runners:[ {label:"走", segs:[run(0.0,0.90,SECOND,SECOND), run(0.90,4.40,SECOND,THIRD)]},
            {label:"走", segs:[run(0.0,0.90,FIRST,FIRST), run(0.90,4.40,FIRST,SECOND)]},
            {label:"打", segs:[run(1.05,5.25,HOME,FIRST)], hideAt:3.95} ],
  caps:[ [0.05,"一・二塁。バッターはバントの構え"], [0.86,"転がした——一塁側！"],
         [1.60,"ファーストが猛チャージ、セカンドが一塁ベースカバーへ"],
         [2.88,"一塁送球、バッターアウト"], [3.95,"送りバント成功。走者は二・三塁に進んだ"] ],
  resAt:3.95 }
];

/* ---------- 再生状態 ---------- */
let play = PLAYS[0], t = 0, speed = 1, last = null, trail = [];

function ballAt(tt){
  let held = null;
  for(const s of play.ball){
    if(tt < s.t0) return held;            // まだ投げていない → 直前の保持位置
    if(tt <= s.t1) return s.at(tt - s.t0);
    held = s.at(s.t1 - s.t0);             // セグメント間は最後の位置で保持
  }
  return held;
}
function fielderAt(key, tt){
  let pos = DEF[key], moving = false;
  const segs = (play.moves && play.moves[key]) || [];
  for(const m of segs){
    if(tt <= m.t0) break;
    const u = easeIO((tt - m.t0) / (m.t1 - m.t0));
    pos = [pos[0] + (m.to[0]-pos[0])*u, pos[1] + (m.to[1]-pos[1])*u];
    if(tt < m.t1) moving = true;
  }
  return {pos, moving};
}
function runnerAt(r, tt){
  if(r.hideAt && tt > r.hideAt) return null;
  let pos = null;
  for(const s of r.segs){
    if(tt < s.t0) return pos;
    const u = Math.min(1,(tt - s.t0)/(s.t1 - s.t0));
    pos = [s.from[0]+(s.to[0]-s.from[0])*u, s.from[1]+(s.to[1]-s.from[1])*u];
  }
  return pos;
}

/* ---------- 球場データ（設計書13-stadiums; 本番は data/stadiums.yaml から供給） ---------- */
// left/right=両翼[m], center=中堅[m]。狭い球場ほどフェンス弧が小さく描かれる。
const STADIUM = { left:95, right:95, center:118 }; // 既定=標準球場

/* ---------- 描画 ---------- */
function drawField(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // 外野芝
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--grass');
  ctx.fillRect(0,0,cv.width,cv.height);
  // フェンス弧: 球場データ駆動（設計書13-stadiums）。エンジン FieldGeometry.FenceDistance と同式。
  // θ>0=右翼(+X)側は right、θ<0=左翼(-X)側は left を用い center と cos(2θ) 補間（左右非対称対応）。
  ctx.beginPath();
  for(let i=0;i<=60;i++){
    const th=(-45+90*i/60)*Math.PI/180;
    const line = th>=0 ? STADIUM.right : STADIUM.left;
    const r = line + (STADIUM.center - line)*Math.cos(2*th);
    const p=px([r*Math.sin(th), r*Math.cos(th)]);
    i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);
  }
  ctx.strokeStyle="#4A6A52"; ctx.lineWidth=4; ctx.stroke();
  // 内野ダート（扇形）
  ctx.beginPath(); const h0=px(HOME); ctx.moveTo(h0[0],h0[1]);
  for(let i=0;i<=40;i++){
    const th=(-45+90*i/40)*Math.PI/180;
    const p=px([30*Math.sin(th),30*Math.cos(th)]);
    ctx.lineTo(p[0],p[1]);
  }
  ctx.closePath(); ctx.fillStyle="#57452F"; ctx.fill();
  // 内野芝ダイヤ
  ctx.beginPath();
  [[0,4.5],[15,19.4],[0,34.4],[-15,19.4]].forEach((q,i)=>{const p=px(q); i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);});
  ctx.closePath(); ctx.fillStyle="#22392B"; ctx.fill();
  // ファウルライン
  ctx.strokeStyle="rgba(239,244,234,.8)"; ctx.lineWidth=2;
  [[67.2,67.2],[-67.2,67.2]].forEach(q=>{ctx.beginPath(); const a=px(HOME),b=px(q); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();});
  // マウンド・ベース
  const m=px(MOUND); ctx.beginPath(); ctx.arc(m[0],m[1],8,0,7); ctx.fillStyle="#57452F"; ctx.fill();
  [HOME,FIRST,SECOND,THIRD].forEach(b=>{const p=px(b); ctx.fillStyle="#EFF4EA"; ctx.fillRect(p[0]-4,p[1]-4,8,8);});
}
function drawToken(p, label, hot){
  const q=px(p);
  ctx.beginPath(); ctx.arc(q[0],q[1],10,0,7);
  ctx.fillStyle="#1D3227"; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle = hot ? "#F5C64A" : "rgba(239,244,234,.85)"; ctx.stroke();
  ctx.fillStyle="#EFF4EA"; ctx.font="10px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(label,q[0],q[1]+.5);
}
function draw(){
  drawField();
  // 軌跡
  ctx.lineWidth=2;
  for(let i=1;i<trail.length;i++){
    ctx.strokeStyle=`rgba(245,198,74,${0.35*i/trail.length})`;
    ctx.beginPath(); ctx.moveTo(trail[i-1][0],trail[i-1][1]); ctx.lineTo(trail[i][0],trail[i][1]); ctx.stroke();
  }
  // 守備・走者
  for(const k of Object.keys(DEF)){ const f=fielderAt(k,t); drawToken(f.pos,k,f.moving); }
  for(const r of play.runners||[]){ const p=runnerAt(r,t); if(p){
    const q=px(p); ctx.beginPath(); ctx.arc(q[0],q[1],9,0,7);
    ctx.fillStyle="#F5C64A"; ctx.fill();
    ctx.fillStyle="#1A1608"; ctx.font="bold 10px sans-serif"; ctx.fillText(r.label||"打",q[0],q[1]+.5);
  }}
  // ボール（影＋本体）
  const b=ballAt(t);
  if(b){
    const g=px([b.x,b.y]);
    ctx.beginPath(); ctx.ellipse(g[0],g[1],4,2.4,0,0,7); ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fill(); // 影
    const by=g[1]-b.h*2.6;
    ctx.beginPath(); ctx.arc(g[0],by,4.2,0,7); ctx.fillStyle="#FFFFFF"; ctx.fill();
    trail.push([g[0],by]); if(trail.length>26) trail.shift();
  }
  // 実況・リザルト
  let text="";
  for(const c of play.caps) if(t>=c[0]) text=c[1];
  capEl.textContent=text;
  resEl.textContent=play.result;
  resEl.classList.toggle('show', t>=play.resAt);
}

/* ---------- ループと操作 ---------- */
function frame(ts){
  if(last!=null && t<=play.dur+0.6) { t += (ts-last)/1000*speed; draw(); }
  last=ts; requestAnimationFrame(frame);
}
function start(p){ play=p; t=0; trail=[]; draw(); }
const playsEl=document.getElementById('plays');
PLAYS.forEach((p,i)=>{
  const b=document.createElement('button'); b.textContent=p.name;
  if(i===0) b.classList.add('on');
  b.onclick=()=>{ playsEl.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); start(p); };
  playsEl.appendChild(b);
});
document.getElementById('replay').onclick=()=>start(play);
document.querySelectorAll('.spd').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.spd').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); speed=parseFloat(b.dataset.s);
});
start(PLAYS[0]); requestAnimationFrame(frame);
</script>
</body>
</html>
