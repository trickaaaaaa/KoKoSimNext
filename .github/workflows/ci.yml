name: engine-ci

# エンジンの CI: dotnet test が回ることが Phase 0 の完了条件（design-07 §3）。
on:
  push:
    paths:
      - "engine/**"
      - "data/**"
      - "global.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "engine/**"
      - "data/**"
      - "global.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore engine/KokoSim.sln

      - name: Build
        run: dotnet build engine/KokoSim.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test engine/KokoSim.sln --configuration Release --no-build --verbosity normal
