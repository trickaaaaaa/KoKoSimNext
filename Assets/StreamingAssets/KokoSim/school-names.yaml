# 校名ジェネレータ語彙（設計書05 §2.1 / school-name-vocab-plan.md）。架空名をパターン合成で量産する。
# 実在校名との完全一致回避はベストエフォート。追加・調整はこのファイル編集で完結。
#
# 構造:
#   - 共有（全国共通）: public_suffixes / private_stems / private_suffixes / private_ratio / place_prefixes
#   - 県別地名: places_by_prefecture（Prefecture.Id へ解決。キーは prefectures.yaml のローマ字名 or 数値Id）
# 生成: 公立 = 県別地名（無ければ共有 place_prefixes）＋ public_suffix、私立 = private_stem ＋ private_suffix。
# ドロー数は常に3（NextDouble×1＋NextInt×2）。語彙を増やしても強さ/名声/校風の生成列は不変＝統計回帰帯は再校正不要。
#
# パーサ制約（SchoolNameVocabParser）: フロー・リストは開き括弧 '[' をキーと同じ行に置くこと（複数行への折返し可）。
#   ○  kanagawa: [横浜, 川崎,
#                 湘南]
#   ×  kanagawa:
#        [横浜, ...]   ← キー行に '[' が無いと読めない

# --- 共有接尾（公立の特徴語。全国共通で自然な方角/学科系） ---
public_suffixes: [東, 西, 南, 北, 中央, 第一, 第二, 第三, 台, 丘, 北陵, 南陽,
                  工業, 商業, 農業, 実業, 総合, 商工, 工科, 情報]

# --- 私立の語幹（架空・全国共有） ---
private_stems: [聖凛, 北都, 明星, 帝都, 星陵, 誠英, 光陵, 青雲, 開智, 至誠,
                東雲, 秀明, 興陵, 文理, 育英, 常翔, 敬愛, 崇文, 英光, 清心,
                明徳, 啓明, 弘学, 尚志, 志成, 桜和, 瑞穂, 翔洋, 慶明, 翠陵]

# --- 私立の接尾（架空・全国共有） ---
private_suffixes: [学院, 学園, 大付属, 国際, 実業, 商大付属, 工科, 産大付属, 学館, 義塾, 附属, 農大付属]

# 私立の生成確率（0.30 → 公立7割。県別地名の恩恵を最大化）。
private_ratio: 0.30

# --- 県別リストが無い県のフォールバック（後方互換の共有地名） ---
