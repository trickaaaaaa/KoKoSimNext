# 球場カタログ（設計書13-stadiums ①物理層）
# 寸法: left/right=両翼[m], center=中堅[m], fence_height=フェンス高[m]
#   right 省略時は left にフォールバック（左右対称）。fence_height 省略時は 2.5m。
# tier: municipal（市営級・序盤）/ prefectural（県営級・準決勝決勝）/ national（聖地）
# wind: ②環境用の箱。今回未使用（設計書13-stadiums §5）。将来の風雨システムで有効化。
# 表示名は命名権（企業名）除去済みの施設名（stadiums-research.md）。甲子園は商標配慮で「甲子園」表記。

# ── 架空基礎タイプ（序盤ラウンド）＋聖地 ─────────────────────────
stadiums:
  # 架空タイプ: 統計検証（狭>標準>広の順序）と序盤ラウンドに使用
  - id: municipal_small_01
    name: 市営球場（狭い）
    left: 91
    center: 115
    fence_height: 2.0
    tier: municipal
  - id: municipal_small_02
    name: 市営球場（やや狭い）
    left: 93
    center: 116
    fence_height: 2.0
    tier: municipal
  - id: standard_01
    name: 標準球場
    left: 95
    center: 118
    fence_height: 2.6
    tier: prefectural
  - id: pref_large_01
    name: 県営球場（広い）
    left: 100
    center: 122
    fence_height: 3.0
    tier: prefectural

  # 聖地（national）
  - id: koshien
    name: 甲子園
    left: 95
    center: 118
    fence_height: 2.6
    tier: national
    # wind: 浜風  # ②用の箱。今回未使用
  - id: jingu
    name: 明治神宮野球場
    left: 97.5
    center: 120
    fence_height: 3.3
    tier: national

