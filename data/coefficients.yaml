# 表示層→物理層の変換係数（不変条件#1: 変換式はここに集約）。
# バランス調整はこのファイルの編集で行い、C# は書き換えない（不変条件#4）。
# 読込は KokoSim.Config が担い、純エンジンへ型付きオブジェクトとして注入する（不変条件#3: エンジンはIOを持たない）。

version: 1

# --- 空力・物理定数（弾道積分の係数, 設計書01 §2⑥） ---
aerodynamics:
  ball_mass_kg: 0.145
  ball_radius_m: 0.0365
  air_density: 1.225
  gravity: 9.81
  drag_coefficient: 0.35
  # 揚力係数 Cl = min(lift_coefficient_per_spin_factor × S, max_lift_coefficient), S = r|ω|/|v|
  lift_coefficient_per_spin_factor: 0.80
  max_lift_coefficient: 0.35

# --- マウンド幾何 ---
mound:
  # リリース〜本塁の実効距離[m]（18.44m − エクステンション約1.7m）
  release_to_plate_distance_m: 16.74

# --- 投球（表示層→物理層, 設計書02 §1.2） ---
pitching:
  # コントロール → 投球散布σ[cm]: σ = intercept − C×slope（例: C50→19cm, C100→8cm）
  control_to_sigma:
    intercept_cm: 30.0
    slope_cm_per_point: 0.22
    min_sigma_cm: 2.0
  # 死球（HBP, design-14 未決F・2026-07-20）: 散布結果が体側ウィンドウ（X負側・高さ帯）へ入り
  # 回避に失敗した球。打者の立ち位置はX負側固定（左右打者の区別は現モデルに無い）🟡
  hbp_body_edge_m: 0.45          # 体側ウィンドウの内縁|X|[m]（ゾーン半幅0.216+ボックス余白）
  hbp_body_bottom_m: 0.20        # 下端[m]（これ未満はワンバウンド＝ボール）
  hbp_body_top_m: 1.60           # 上端[m]（これ超は頭上抜け＝ボール）
  hbp_dodge_prob: 0.85           # ウィンドウ内の球を打者が避けられる確率
  # 毎球の球速ばらつき（設計書02 §1.1d）: 最速=天井、常時は−3〜5km/h、たまに最速付近 🟡
  velocity_drop_mean_kmh: 4.0
  velocity_drop_sigma_kmh: 1.8
  velocity_drop_max_kmh: 10.0
  # 配球（Phase 簡略。設計書09で采配・慣れ §2.3b に接続）
  straight_share: 0.55
  catcher_lead_stuff_per_point: 0.004   # 捕手リード→球威（設計書01 §2①）。(Lead−50)×これ。50=恒等
  # 回転数マッピング（設計書15 §0.1 Q12-5, Phase B観測専用の暫定式。判定には未接続＝帯に無関係）
  spin_rpm_base: 2200.0            # キレ(Sharpness=50)基準の回転数[rpm]（145km/h・2200rpmはCLAUDE.md検証値）
  spin_rpm_per_sharpness: 6.0       # キレ(Sharpness−50)あたりの傾き[rpm/能力1]
  # 投手ギア「飛ばす/流す」（設計書02 §1.1f）🟡
  gear_push_velocity_bonus_kmh: 2.0
  gear_push_stamina_factor: 1.6
  gear_coast_velocity_penalty_kmh: 2.5
  gear_coast_stamina_factor: 0.7

# --- 打撃（打席解決の確率・物理変換, Phase 1 統計回帰で調整済み） ---
# league-average 母集団で AVG≈.265 / K%≈19.6 / BB%≈8.6 / HR%≈3.1 に収まる初期値。
batting:
  aim_sigma_x_m: 0.10            # 投手の狙い散布σ（横）
  aim_sigma_y_m: 0.155           # 投手の狙い散布σ（縦）
  zone_swing_base: 0.68          # ゾーン内スイング率
  chase_base: 0.28               # ゾーン外追いかけ率
  chase_discipline_slope: 0.0045 # 選球眼→追いかけ抑制
  zone_swing_discipline_slope: 0.0015
  # 誘発変化合成量[m]（設計書15 Phase E-3）: ゾーン外+/ゾーン内−の対称係数（見え方と実軌道のズレの代理指標）
  chase_break_slope: 0.02
  chase_distance_slope: 0.15    # ゾーン外距離あたりのチェイス減衰（大外れが変化量だけで釣れる不自然を防ぐガード）
  whiff_intercept: -2.40         # 空振り対数オッズ基準（Phase E-2で弾道由来モデルへ再校正）
  whiff_contact_slope: 0.030     # ミート→空振り減
  whiff_out_of_zone_penalty: 0.85
  # 誘発変化合成量[m]（設計書15 Phase E-2）あたりの空振り加算。旧stuff_per_pitch_rank（球種ランク直参照）は
  # Sharpness→rpm→変化量の経路で弾道へ織り込み済みのため完全置換（二重計上回避）。校正ノブ。
  whiff_break_slope: 1.5
  foul_share: 0.40               # コンタクト中のファウル割合
  # 球速→球威。基準はリーグ平均投手の平均リリース球速（最速132 − 平均ドロップ4）に置き、
  # 傾きは「球速1レベル ≈ ミート1レベル」になるよう 0.030 ÷ 0.47(km/h per level) ≈ 0.064 とする。
  stuff_base_velocity_kmh: 128.0
  stuff_per_kmh: 0.064
  exit_velo_intercept_kmh: 125.0 # 打球初速上限の切片
  exit_velo_per_power: 0.82      # パワー1あたり初速上限
  quality_mean: 0.62
  quality_contact_slope: 0.0020
  quality_sigma: 0.17
  launch_angle_at_lt1: -5.0      # 弾道1の平均打球角
  launch_angle_at_lt100: 26.0    # 弾道100の平均打球角
  launch_angle_sigma: 12.0
  bearing_sigma: 20.0
  min_quality_velo_factor: 0.55
  # コンタクト品質への投手側寄与（「打たせて取る」の土台）。3項とも基準値で寄与0＝リーグ平均投手で恒等。
  contact_quality_velocity_ref_kmh: 121.5  # 平均的な配球の実投球速度（ストレート比0.55×球種の球速比込み）
  contact_quality_per_kmh: 0.0010          # 速い球は当たれば強い打球（本格派の代償）
  contact_quality_per_control: -0.0010     # 制球が良いほど芯を外させる（技巧派の武器）
  contact_quality_break_ref_m: 0.47        # 132km/h・2200rpm の誘発変化合成量
  contact_quality_per_break_m: -0.30       # 変化が大きいほど詰まる

# --- 守備（弾道→捕球/送球判定） ---
fielding:
  fly_apex_threshold_m: 2.5
  catch_reach_factor: 1.00
  throw_transfer_seconds: 0.70
  throw_transfer_fielding_slope: 0.004 # 握り替えの守備連動（Issue #36）: 倍率=max(min,1−(守備−50)×これ)。守備50で×1.0＝恒等
  throw_transfer_factor_min: 0.70      # トランスファー倍率の下限（最速側クランプ, Issue #36）
  infield_play_overhead_seconds: 0.30  # 内野ゴロ処理の実戦オーバーヘッド（時間軸校正, §4.1b）
  runner_reaction_seconds: 0.45        # 実戦オフセット（設計書02 §4.1b: 走力50右で本塁→一塁≈4.2s）
  left_batter_first_step_bonus_seconds: 0.13  # 左打者は一塁が近く速い（§4.1b）
  infield_depth_m: 46.0
  force_out_margin_seconds: 0.0
  # 失策モデル（issue #123, 2026-07-23）: 平均守備(Catching50)で0.064＝両軍計≈2.4/試合（甲子園実測2.1〜2.7域）。
  # 守備力連動は非対称: 弱小側(50未満)は急傾斜(slope 0.0065)で弱小同士(C25)を両校計≈10失策へ、
  # 精鋭側(50超)は緩傾斜(slope_strong 0.001)で「守備を上げるほど失策が減る」勾配を残す（精鋭C90でも≈1/試合＝
  # 能力向上の意味を保つ）。守備力が試合結果を大きく分ける＝オーナー方針2026-07-23。
  error_base_prob: 0.0384             # 捕球エラー基準（Catching50時）。issue #169で送球ロール正値化に伴い旧0.064から再配分（内野ゴロ失策の約60%を捕球由来に）
  error_catching_slope: 0.0065        # 平均未満（弱小側）の傾き。旧0.0003は守備連動が弱すぎた
  error_catching_slope_strong: 0.001  # 平均超（精鋭側）の傾き。緩くして精鋭に失策の勾配を残す
  error_min_prob: 0.001               # 失策確率の下限
  error_max_prob: 0.30                # 失策確率の上限（弱小同士の大量失策の天井）
  # 送球エラー（内野ゴロ→一塁の2段階目, Issue #37 / design-14 P1-6b）。捕球ロール(Catching)の後の送球ロール(ThrowAccuracy)。
  # base=0 で送球ロールを引かない＝現行の捕球のみ判定と完全一致（決定論不変）。正値で悪送球が能力駆動に。
  throw_error_base_prob: 0.0266       # 送球エラー基準確率（ThrowAccuracy50時）。issue #169で正値化＝Ac50で内野ゴロ失策の約40%が送球由来
  throw_error_accuracy_slope: 0.004   # 送球精度(Ac−50)あたりの悪送球減少幅
  # 空中捕球の守備範囲（Issue #24 原因2）。滞空時間比例のままだと深い飛球ほど守備範囲が
  # 無制限に広がるため、走れる時間に絶対上限を掛け、走路取りの巧拙（守備力）で伸縮させる。
  # 守備50・上限未満では従来（滞空×1.00）と同一。
  catch_reach_fielding_slope: 0.004
  catch_reach_cap_seconds: 4.00
  # --- 塁打数の決定（Issue #24 原因1: 距離しきい値を廃止し、転がり＋幾何＋走力の連続量へ） ---
  roll_decel_mps2: 2.60          # 着地後の転がりの減速度（芝・土の摩擦＋バウンド損失）
  roll_retention_flat: 0.72      # 水平に近いライナーがバウンドで保持する前進速度の割合（滑って伸びる）
  roll_retention_steep: 0.25     # 真上から落ちる大飛球が保持する割合（失速して死ぬ）
  fence_carom_seconds: 0.40      # フェンス到達打球の跳ね返り処理の追加時間
  outfield_pickup_seconds: 0.30  # 転がる打球を拾い上げる時間
  throw_distance_drag_per_m: 0.0045  # 送球の失速: 到達 = 距離÷送球速度×(1+距離×この値)
  running_top_speed_factor: 1.15 # 一塁到達後の巡航速度倍率（本塁→一塁の平均速度に対する比）
  base_turn_seconds: 0.30        # 塁を回る方向転換のロス
  extra_base_margin_seconds: 0.40  # 進塁判断マージン（走者所要＋この値 ≤ 送球到達 で次の塁へ）
  # 守備位置適性→実効守備力の補正（設計書01 §1.1）。基準50で×1.0、本職＝高適性でボーナス、慣れないポジでペナルティ。
  aptitude_neutral: 50.0
  aptitude_slope_per_point: 0.006
  aptitude_factor_min: 0.60
  aptitude_factor_max: 1.30

# --- 走塁（進塁確率, Phase 2。平均得点≈4.3/チームに収まる初期値） ---
# 進塁判断は走塁判断(Baserunning)を参照（速度は走力, 判断は走塁判断。設計書02 §4.1）
baserunning:
  first_to_third_on_single: 0.28
  second_to_home_on_single: 0.62
  first_to_home_on_double: 0.48
  speed_slope: 0.006
  sac_fly_score_prob: 0.30
  productive_out_advance_prob: 0.18
  double_play_prob: 0.13
  fielders_choice_prob: 0.06       # 野選（FC, design-14 P1-1）: DP不成立時に先行走者アウト＋打者一塁生存（2026-07-17校正）
  error_extra_advance_prob: 0.20   # 失策連鎖（design-14 P1-6）: ReachedOnError時に全走者+打者へ追加1進塁（2026-07-17校正）
  error_extra_advance_accuracy_slope: 0.003  # 失策連鎖の送球精度連動（Issue #37）: 確率=prob−(Ac−50)×これ。0で非連動＝恒等

  drop_third_strike_reach_prob: 0.001      # 振り逃げ（design-14 P1-2）: 一塁空き or 2アウトの三振で成立（2026-07-17校正）
  drop_third_strike_catching_slope: 0.002  # 捕手Catching(-50)あたりの成立確率減少幅
  wild_pitch_prob: 0.0012          # 暴投（design-14 P2-8）: 走者あり・実球（Ball/CalledStrike/SwingingStrike）ごとの基準確率（2026-07-20校正）
  wild_pitch_control_slope: 0.0006 # 投手Control(-50)あたりの暴投確率の減少幅
  passed_ball_prob: 0.0008         # パスボール（design-14 P2-8）: 同上・捕手責
  passed_ball_catching_slope: 0.0006 # 捕手Catching(-50)あたりのパスボール確率の減少幅
  # 盗塁（設計書02 §4.2）: すべて秒の時間軸で校正（🟡 設計書07で実タイムに合わせ込む）
  steal_lead_distance_m: 23.5
  catch_throw_distance_m: 38.8
  steal_reaction_intercept: 0.90   # スタート遅延[s] = intercept − steal×slope（Step4再校正: 快足を3.4秒台へ）
  steal_reaction_slope: 0.004
  pitcher_quick_seconds: 1.40      # 投手クイック（投法補正は後回し）
  pop_transfer_seconds: 0.70       # 捕手の握り替え（ポップ = これ＋送球時間）
  transfer_fielding_slope: 0.004   # 走塁系トランスファーの守備連動（Issue #36）。fielding.throw_transfer_fielding_slope と揃える
  transfer_factor_min: 0.70        # 走塁系トランスファー倍率の下限（Issue #36）
  tag_seconds: 0.10
  steal_margin_scale: 0.22         # margin→成功確率のlogistic幅（Step4再校正: 肩差が効く幅に拡張）
  steal_success_bias: 0.38         # リーグ平均成功率の校正項（🟡, Step4再校正）
  catch_throw_to_third_distance_m: 27.4  # 本塁→三塁の送球距離（design-14 P1-4、三盗）
  steal_third_success_bias: -0.35  # 三盗の成功率バイアス（design-14「三盗は成功率下方」）
  steal_home_success_bias: -0.7    # 本盗の成功率バイアス（design-14「本盗はさらに下方」）
  double_steal_third_break_prob: 0.4  # 一・三塁重盗（design-14 P1-4）: 三塁走者も同時スタート（2026-07-17校正）
  pickoff_base_prob: 0.05          # 牽制アウト（design-14 P1-5）の基準確率（2026-07-17校正）
  pickoff_runner_lead_slope: 0.0015
  pickoff_pitcher_sense_slope: 0.001
  pickoff_max_prob: 0.08
  # バント（設計書02 §4.3）
  bunt_base: 0.60
  bunt_skill_slope: 0.005          # バント×0.5%
  bunt_velocity_ref_kmh: 130.0
  bunt_velocity_penalty_per_kmh: 0.004
  bunt_miss_share: 0.07
  bunt_foul_share: 0.18            # Bunt50時。上手いほど減る（Step4-③）
  bunt_foul_skill_slope: 0.0012   # (Bunt−50)あたりファウル減
  bunt_foul_floor: 0.06
  bunt_pop_share: 0.05
  # バント内野安打の時間軸判定（設計書02 §4.1b, Step4-②）: 打者走者→一塁 対 バント処理→送球
  bunt_base_distance_m: 27.4
  bunt_runner_reaction_seconds: 0.45   # 守備側 runner_reaction_seconds と同軸
  bunt_left_first_step_bonus_seconds: 0.13
  sacrifice_bunt_square_delay_seconds: 0.35  # 犠打は早く構えて走り出しが遅い
  safety_bunt_square_delay_seconds: 0.12     # セーフティは走りながら転がす
  bunt_field_throw_base_seconds: 3.70        # コーナー突進＋素手＋短距離送球
  bunt_placement_slope: 0.006                # 好バントほど処理が遅れる
  bunt_infield_hit_time_scale: 0.14          # margin→確率のlogistic幅
  # 本塁クロスプレー（バックホーム憤死, 設計書12 §3, F2）: 走塁 §4.1 と同じ秒の時間勝負
  home_runner_reaction_intercept: 0.55       # 本塁を狙う走者の判断遅延[s] = intercept − 走塁判断×slope
  home_runner_reaction_slope: 0.004
  home_lead_distance_m: 3.5                   # 二次リード分の距離短縮[m]
  outfield_transfer_seconds: 0.60            # 外野の捕球→送球（グラブ離し）
  relay_transfer_seconds: 0.55               # 中継の握り替え
  relay_throw_speed_mps: 32.0                # 中継野手の送球速度（リーグ平均内野肩）
  cutoff_fraction_from_home: 0.5             # カットマン位置（本塁からの距離割合）
  cutoff_distance_threshold_m: 60.0          # これ超で中継、以下は本塁へ直接返球
  home_tag_seconds: 0.12
  home_grounder_start_delay_seconds: 1.55    # ゴロ凡打の三塁走者は打球を読んでから走る＝遅い(G1)
  home_margin_scale: 0.25                    # margin→生還確率のlogistic幅
  home_success_bias: 2.00                    # 憤死≈0.26/試合・得点≈4.08/チームへ校正（Slice C, Heavy実測）
  # 三塁への進塁レース（単打の一塁→三塁, Issue #89, 設計書12 §3.5/§4.6）: 本塁と同型で三塁ベースへ解く
  third_tag_seconds: 0.10                     # 三塁でのベースタッチ（本塁クロスプレーより短い）
  third_margin_scale: 0.45                    # margin→確率のlogistic幅（本塁より広め＝打球の深さ・外野の肩を効かせる）
  third_success_bias: 1.50                    # 一塁→三塁の到達率・三塁憤死を現実値へ校正（Heavy実測, Issue #89）
  # 犠飛のタッチアップ（Issue #90, 設計書12 §3.5）: 走者は捕球時刻にスタート（二次リードなし＝全塁間27.4mを走る）、
  # 守備も同じ捕球時刻から送球＝共通起点が捕球時刻。深い外野フライは送球が長く生還、浅いフライは自重/憤死。
  tag_up_margin_scale: 0.40                   # margin→生還確率のlogistic幅（本塁クロスプレーより広め＝深さ・肩を効かせる）
  tag_up_success_bias: 1.50                   # 生還率・本塁憤死頻度を現実値へ校正（Heavy実測, Issue #90。球質タイプ中立を維持）
  close_call_margin_seconds: 0.15            # 判定オーバーレイ（Issue #59）: |margin|がこれ未満なら「際どい」＝セーフ表示。アウトは常時表示のため無関係
  # ライナー併殺（コンタクト始動の一塁走者が捕られ戻れず, 設計書12 §4, G2）
  liner_break_reaction_seconds: 0.05         # 接触と同時に飛び出す＝ほぼ即時
  liner_commit_cap_seconds: 1.00             # 「盲目的に走る」時間の上限（長い滞空でもリードが伸び続けない）
  liner_reference_sprint_speed_mps: 7.25     # リード算出の基準走力（個人差は戻りの走力にだけ効く）
  doubled_off_reverse_seconds: 0.35          # 捕球を見て反転するまでの判断遅延
  doubled_off_transfer_seconds: 0.30         # 捕球野手の捕球→送球（内野寄りなので外野より短い）
  doubled_off_tag_seconds: 0.10
  doubled_off_margin_scale: 0.20             # margin→塁へ戻れる確率のlogistic幅
  doubled_off_success_bias: 0.0              # 校正前の暫定値（Heavy実測で調整）
  # 守備の読み/ピッチアウト（設計書09 §1, 設計書12 §5, G3）: 捕手リード＋投手センス vs 状況の意外性
  steal_expectedness_intercept: 0.42         # 盗塁企図の基準「予想されやすさ」E
  steal_expectedness_steal_slope: 0.006      # Steal能力→予想度（快足盗塁屋は読まれやすい）
  gamble_unexpectedness_reduction: 0.28      # ギャンブル始動は意表＝予想度を下げる（G3b配線）
  steal_read_intercept: 0.50                 # 読み力の基準（捕手リード＋投手センス）
  steal_read_catcher_lead_slope: 0.006       # 捕手リード(Lead−50)あたり読み力加算
  steal_read_pitcher_sense_slope: 0.003      # 投手センス(Mental−50)あたり読み力加算
  max_pitchout_prob: 0.55                    # 読み切っても上限
  pitchout_defense_bonus_seconds: 0.35       # ピッチアウト成功で守備時間短縮（捕手優位）
  gamble_pitchout_extra_bonus_seconds: 0.20  # ギャンブル走者は無防備でさらに刺されやすい（G3b配線）
  gamble_jump_bonus_seconds: 0.15            # ギャンブルの好スタート（走者時間短縮, G3b配線）

# --- 投手疲労（設計書02 §1.1e: スタミナ＝目安投球数を超えた球数で減衰・継投） ---
# 目安投球数そのものは選手側（StaminaPitches）。Level→球数の変換は 45 + level×0.9（PitcherAttributes に集約）
fatigue:
  velocity_drop_per_over_pitch: 0.05
  control_drop_per_over_pitch: 0.12
  relieve_pitch_margin: 25.0
  hard_cap_pitches: 130.0

# --- 試合間の回復モデル（設計書02 §1.1e・issue #41: 連戦で目安投球数が回復し切らない） ---
# 前登板からの休養日数 × 直近ウィンドウの球数 → 実効の目安投球数を減衰させる。🟡 実測校正前のプレースホルダ。
# 現状は台帳＋モデルのみで本流未配線（帯不変）。本流配線＋Heavy帯再校正は後続issue（#42含む）でまとめて行う。
pitch_recovery:
  full_recovery_days: 7.0        # これ以上の休養（中6日相当）で完全回復＝実効＝目安投球数
  reference_pitches: 100.0       # 「重い登板」の基準球数（直近球数がこれ以上で負荷は最大に張り付く）
  max_reduction_fraction: 0.5    # 連投かつ重い登板が重なったときの最大減衰率（目安投球数比）

# --- 調子・試合限りの好不調（設計書02 §3.3/§3.3b）🟡「調子が支配的にならない」よう控えめ ---
form:
  # 調子（5段階, 1段階あたりの効果）
  contact_per_step: 2.5
  power_per_step: 2.0
  control_per_step: 2.5
  velocity_per_step_kmh: 0.6
  sharpness_per_step: 2.5    # キレ(PitchRank/球種Sharpness)への補正。Controlと同スケール（issue #49）
  # 試合限りの好不調（当日の出来。大半は微小・スパイクは十数試合に一度）
  day_form_base_sigma: 0.15
  day_form_clamp: 0.45
  day_form_spike_prob: 0.07
  day_form_spike_min: 0.6
  day_form_spike_max: 1.0
  contact_per_day_form: 3.0
  power_per_day_form: 2.0
  control_per_day_form: 5.0
  velocity_per_day_form_kmh: 1.5
  sharpness_per_day_form: 5.0  # キレへの当日補正。Controlと同スケール（issue #49）
  # 週次の波（数日〜数週間続く。毎試合振り直さない）
  weekly_persistence: 0.75
  weekly_sigma: 0.28
  # 相手校の調子観測（監督の育成眼が高いほど正確、低いと誤認。issue #47）
  observe_sigma_base: 0.65          # 育成眼0時のノイズσ
  observe_sigma_per_talent_eye: -0.0063  # 育成眼1あたりのσ減少（TalentEye=100でσ下限）
  observe_sigma_min: 0.02           # σの下限（育成眼MAXでも僅かな誤差は残す）
  # 試合結果によるConditionValueフィードバック（自校の詳細シム1試合ぶん。issue #46）
  match_hit_bonus: 0.02             # 好打: 安打1本あたりの加点
  match_home_run_bonus: 0.03        # 好打: 本塁打1本あたりの追加加点
  match_hitless_min_at_bats: 3      # 不振判定: この打数以上で無安打なら減点対象
  match_hitless_penalty: 0.04       # 不振の減点
  match_quality_start_min_outs: 15  # 好投判定: 投球回(アウト数)がこれ以上（15=5回）
  match_quality_start_max_runs: 2   # 好投判定: 失点がこれ以下
  match_quality_start_bonus: 0.05   # 好投の加点
  match_rocked_runs_threshold: 5    # 被弾判定: 失点がこれ以上
  match_rocked_penalty: 0.05        # 被弾の減点
  match_blowout_loss_margin: 7      # 大敗判定: 点差がこれ以上
  match_blowout_loss_penalty: 0.03  # 大敗時、出場者全員への追加減点

# --- 特殊能力の効果量・出現率（設計書10）🟡 スキルなしの選手には作用しない（帯不変） ---
# スキルの定義（id・カテゴリ・説明）は data/skills.yaml。ここは効果の強さと生成率だけ。
skills:
  # 打撃系（試合内・行動特性）
  slow_starter_bat_contact_per_pa: 1.6   # 尻上がり: 打席数あたりのミート増
  slow_starter_bat_max_bonus: 6.0
  spray_bearing_factor: 1.35             # 広角打法: 打球方向σ拡大（シフト無効化）
  first_pitch_swing_prob: 0.62           # 初球から振る
  grinder_foul_factor: 1.30              # 粘り打ち: ファウル率拡大（球数を吐かせる）
  streaky_variance_factor: 1.7           # ムラっけ: 当日の出来の振れ幅拡大
  # 投手系（試合内・非線形）
  slow_starter_pitch_control_per_bf: 0.45
  slow_starter_pitch_max_bonus: 8.0
  second_time_through_batters_faced: 18  # 打者一巡: 3巡目〜崩れる
  second_time_through_control_penalty: 6.0
  second_time_through_stuff_penalty: 0.10
  effectively_wild_control_penalty: 7.0  # 荒れ球: 制球↓（四球増）だが…
  effectively_wild_stuff_bonus: 0.13     # …打ちにくい
  deceptive_ball_stuff_bonus: 0.18       # クセ球: 球速に依らない空振り誘発
  # 守備系
  double_play_artist_bonus: 0.06
  master_catcher_lead_bonus: 10          # 名捕手: 実効リード+10（設計書10, 01 §2①）
  # チーム系
  spiritual_pillar_captain_factor: 1.4   # 精神的支柱: 主将の緩和量拡大（設計書09 §8）
  # 体質・成長系
  diligent_exp_factor: 1.15
  lazy_exp_factor: 0.85
  durable_injury_factor: 0.55
  injury_prone_injury_factor: 1.8
  # 目玉（怪物: 複数分野に確かな上乗せ）
  monster_contact_bonus: 4.0
  monster_power_bonus: 4.0
  monster_control_bonus: 4.0
  monster_stuff_bonus: 0.10
  # 生成（0〜数個、目玉は極稀、一部は隠し）
  max_skills_per_player: 3
  common_skill_prob: 0.16
  hidden_share: 0.22
  marquee_skill_prob: 0.008
  pillar_leadership_threshold: 68
  pillar_bonus_prob: 0.35

# --- 性格（設計書01 §1.1, CHANGELOG 22b）🟡 母集団平均が中立になるよう重みと係数を対称化（帯ドリフト最小化） ---
# 内部4傾向値: ①統率(leadership_mean_offset) ②素直さ(coaching_receptivity) ③勤勉さ(self_growth_factor)
# ④自己犠牲⇔目立ちたがり(bunt_success_bonus 加算 / chance_hit_factor 得点圏強攻の長打質倍率)。各軸の効き先は1つ。
personalities:
  factor_jitter_sd: 0.06     # PersonalityFactor のタイプ内個体差σ（タイプが中心）
  factor_min: 0.75
  factor_max: 1.25
  profiles:
    #                  weight  coaching  growth  bunt    chance  lead
    - { type: HotBlood,     spawn_weight: 1.0, coaching_receptivity: 1.00, self_growth_factor: 1.08, bunt_success_bonus:  0.05, chance_hit_factor: 0.99, leadership_mean_offset:  14 }
    - { type: Hardworker,   spawn_weight: 1.4, coaching_receptivity: 1.06, self_growth_factor: 1.10, bunt_success_bonus:  0.05, chance_hit_factor: 0.99, leadership_mean_offset:   4 }
    - { type: Genius,       spawn_weight: 0.5, coaching_receptivity: 0.88, self_growth_factor: 1.10, bunt_success_bonus: -0.06, chance_hit_factor: 1.10, leadership_mean_offset:   0 }
    - { type: HonorStudent, spawn_weight: 1.0, coaching_receptivity: 1.10, self_growth_factor: 1.00, bunt_success_bonus:  0.05, chance_hit_factor: 0.98, leadership_mean_offset:  12 }
    - { type: MyPace,       spawn_weight: 1.4, coaching_receptivity: 0.94, self_growth_factor: 0.95, bunt_success_bonus:  0.00, chance_hit_factor: 1.00, leadership_mean_offset:   0 }
    - { type: MoodMaker,    spawn_weight: 1.2, coaching_receptivity: 1.00, self_growth_factor: 0.92, bunt_success_bonus: -0.06, chance_hit_factor: 1.08, leadership_mean_offset:   4 }
    - { type: LoneWolf,     spawn_weight: 0.8, coaching_receptivity: 0.92, self_growth_factor: 1.00, bunt_success_bonus: -0.05, chance_hit_factor: 1.06, leadership_mean_offset: -16 }
    - { type: Introvert,    spawn_weight: 1.2, coaching_receptivity: 1.08, self_growth_factor: 0.95, bunt_success_bonus:  0.04, chance_hit_factor: 0.97, leadership_mean_offset: -14 }

# --- プレッシャー指数×精神力（設計書02 §3.1-3.2）🟡 精神力50は常に恒等（帯不変） ---
pressure:
  late_inning_from: 8        # 8回以降 +1
  close_score_diff: 2        # 2点差以内 +1
  risp_point: 1              # 得点圏 +1
  bases_loaded_point: 2      # 満塁 +2
  retirement_point: 1        # 負けたら引退（3年夏）+1
  max_index: 8
  multiplier_slope: 0.02     # 倍率 = 1 + (精神力−50)/50 × slope × P（精神力100・P8で+16%）
  fatigue_negative_amplify: 1.5   # 疲労閾値超過時は負側のみ増幅（終盤の失点劇）

# --- 采配（設計書09: サイン/守備指示/伝令/主将）🟡 判断閾値と効果量 ---
tactics:
  # 攻撃サイン判断（StandardTacticsBrain＝委任・敵AIの土台）
  sac_bunt_from_inning: 7
  sac_bunt_prob: 0.55
  sac_bunt_tie_break_prob: 0.90    # タイブレークでは犠打価値が跳ね上がる（§7）
  sac_bunt_max_power: 58
  sac_bunt_min_skill: 40
  sac_bunt_max_behind: 2
  sac_bunt_max_ahead: 1
  squeeze_from_inning: 8
  squeeze_prob: 0.28
  squeeze_max_diff_abs: 1
  squeeze_min_bunt: 55
  steal_min_success: 0.72          # 解決式の成功見込みがこの値以上で仕掛ける
  steal_prob: 0.45
  # 三盗・本盗（issue #67, design-14 未決A）: 二塁のみ在塁／三塁のみ在塁でのみ判定。塁状況が排他のため
  # 一・三塁の重盗（baserunning.double_steal_third_break_prob）とは競合しない。
  # 三盗: 解決式の実現可能な見込み天井自体が二盗（≈0.95）よりずっと低い（俊足×弱肩でも≈0.4〜0.65）ため、
  # 0.30は「三盗レンジの中で上位のみ」という相対的な選別線（TacticsCoefficients.StealThirdMinSuccess参照）。
  steal_third_min_success: 0.30
  steal_third_prob: 0.25
  steal_third_max_outs: 0          # 無死のみ
  steal_third_max_diff_abs: 3      # 大差では狙わない
  # 本盗: 解決式は守備側を投手クイック＋タッチのみで評価し走者の塁間走破に追いつけないため、成功見込みは
  # どの選手でも解決式の下限(0.01)に張り付く＝成功見込みでの選別が無意味。閾値0＝常に通過させ、頻度は
  # steal_home_prob と状況条件だけで絞る「超高閾値のギャンブル枠」。
  steal_home_min_success: 0.0
  steal_home_prob: 0.10
  steal_home_max_outs: 1
  steal_home_max_diff_abs: 1       # 僅差のみ（スクイズと競合する場面はGameEngine側で単純上書き）
  hit_and_run_prob: 0.07
  hit_and_run_min_contact: 55
  hit_and_run_max_power: 65
  # ギャンブル始動（設計書12 §5, G3b）: 際どい盗塁ほど好ジャンプ・意表に賭ける
  gamble_start_max_success: 0.82   # 見込みがこの値未満の盗塁でギャンブルを検討
  gamble_start_prob: 0.40          # 際どい盗塁でギャンブル始動に賭ける確率
  take_max_control: 40
  take_prob: 0.30
  # 本塁への送り判定（設計書12 §3/§4, F2）: 生還推定確率がこの閾値以上なら還す
  send_home_min_success: 0.50        # 中立采配の送り閾値（Slice C校正: 憤死を目標帯へ）
  send_home_two_out_relax: 0.30      # 2アウトは緩和（積極的に還す）
  send_home_aggression_span: 0.50    # aggression(0..1)で閾値を±動かす幅
  # 三塁への送り判定（単打の一塁→三塁, Issue #89）: 三塁は失うものが小さく閾値は本塁より低め
  send_third_min_success: 0.60       # 中立采配で三塁へ回す閾値
  send_third_two_out_relax: 0.25     # 2アウトは緩和
  send_third_aggression_span: 0.45   # aggression(0..1)で閾値を±動かす幅
  # 内野深さ×ゴロ×本塁（G1, 設計書12 §4/§5）は深さで本塁プレーの有無を分岐（前進=勝負/後退=献上/通常=テーブル）。
  # 送りバイアスは baserunning.home_grounder_start_delay_seconds で調整。
  # 守備指示判断
  bunt_shift_prob: 0.50
  infield_in_from_inning: 8
  infield_in_max_lead: 1
  outfield_deep_min_power: 72
  control_first_max_control: 38
  keep_low_min_power: 75
  gear_push_innings_left: 1
  gear_push_max_diff_abs: 1
  gear_coast_min_lead: 5
  # 敬遠（design-14 P1-3）: 一塁空き・得点圏・強打者・僅差終盤で次打者と勝負。既定オフ
  intentional_walk_min_power: 70
  intentional_walk_from_inning: 6
  intentional_walk_max_diff_abs: 3
  intentional_walk_prob: 0.6
  # 伝令判断（攻守各3回, §3）
  defense_timeout_min_pressure: 3
  offense_timeout_min_pressure: 5
  offense_timeout_max_mental: 42
  # 選手交代判断（設計書09 §6, C-2。決定論=能力の極値を選ぶ）
  pinch_hit_from_inning: 7
  pinch_hit_contact_ceiling: 46      # この打者ミート以下を代打候補に
  pinch_hit_improvement: 12          # 控えがこれだけミート上なら送る
  pinch_hit_min_diff: -3             # 代打を出す得失点差レンジ（僅差〜小ビハインド）
  pinch_hit_max_diff: 2
  pinch_run_from_inning: 8
  pinch_run_speed_ceiling: 44        # この走力以下の走者を代走候補に
  pinch_run_improvement: 22          # 控えがこれだけ走力上なら送る
  pinch_run_min_diff: -2             # 1点を取りにいく場面（ビハインドこの点以内〜+1）
  defensive_sub_from_inning: 8
  defensive_sub_min_lead: 1          # このリード以上で守備固め
  defensive_sub_fielding_ceiling: 44 # この守備以下を交代候補に
  defensive_sub_improvement: 12      # 控えがこれだけ守備上なら固める
  # サイン効果（補正係数。パイプライン不変）
  hit_and_run_contact_boost: 0.10
  hit_and_run_power_penalty: 0.15
  hit_and_run_launch_penalty: 0.20
  hit_and_run_caught_penalty: 0.15
  buster_vs_shift_bonus: 0.08
  buster_penalty: 0.05
  squeeze_read_base: 0.08          # ウエスト（バッテリー察知）
  squeeze_read_per_lead: 0.002
  squeeze_read_obvious_bonus: 0.05
  # 陣形→初期守備位置（効果は幾何＝物理から出る, §2.1）
  infield_in_factor: 0.82
  infield_deep_factor: 1.12
  outfield_in_factor: 0.88
  outfield_deep_factor: 1.10
  bunt_shift_corner_charge_factor: 0.60
  # 配球方針の重み（§2.2）
  fastball_heavy_share_delta: 0.25
  breaking_heavy_share_delta: -0.25
  control_first_aim_sigma_factor: 0.72
  keep_low_aim_y_offset_m: -0.18
  inside_aim_x_offset_m: 0.15
  # 伝令効果・動揺・主将（§3/§8）
  timeout_mitigation: 0.60
  timeout_duration_pa: 3
  rattled_consecutive_baserunners: 3
  rattled_negative_amplify: 1.4
  rattled_threshold_mental_offset: 1   # 精神力50で従来同値・100で+1しにくく・0で-1しやすく（issue #73）
  rattled_recovery_outs: 2             # 動揺後、無失点でこの数アウトを重ねると自然回復（issue #73）
  captain_mitigation_per_power: 0.004   # 統率力（統率傾向×精神力/100）1あたりの負補正緩和
  captain_bench_factor: 0.30
  # 1球采配（設計書15 §2.3, Phase C）
  pitch_tactics_two_strike_force_swing_prob: 0.35  # 追い込まれ矯正（見逃し三振回避）
  pitch_tactics_two_strike_min_contact: 50
  pitch_tactics_three_zero_take_prob: 0.85         # 3-0待て
  pitch_tactics_three_zero_swing_away_min_power: 80
  pitch_tactics_three_zero_swing_away_from_inning: 7
  pitch_tactics_three_zero_swing_away_max_diff_abs: 1
  pitch_tactics_put_away_prob: 0.50                # 守備: 2ストライク後の決め球切替
  pitch_tactics_control_first_min_balls: 3         # 守備: 不利カウントでゾーンに集める

# --- 敵AI（設計書11: 三層＝能力値ミス率×ティア引き出し×校風）🟡 別途の難易度補正は持たない ---
# プレイヤーとAIは同じ采配システム（tactics:）を使い、選び方だけがこの三層で変わる。
enemy_ai:
  # ① 能力値層: 最適解選択率 = base + 采配能力 × per_sense
  optimal_base: 0.55
  optimal_per_sense: 0.004
  optimal_floor: 0.50
  optimal_cap: 0.98
  reckless_on_miss_prob: 0.18       # 正着を外したとき無謀な盗塁に走る確率
  # ② ティア層: 各戦術の最低ティア（0=G 〜 7=S）
  safety_bunt_min_tier: 2           # E: 状況セーフティ
  steal_min_tier: 2                 # E: 状況盗塁
  steal_third_min_tier: 4            # C: issue #67 三盗は状況を見極めた上位校のみ
  steal_home_min_tier: 6             # A: issue #67 本盗は超高閾値のギャンブル枠＝最上位のみ
  gamble_start_min_tier: 4          # C: ギャンブル始動（好ジャンプ・意表, G3b）
  squeeze_min_tier: 5               # B: 上級
  hit_and_run_min_tier: 5           # B: 上級
  buster_min_tier: 5                # B: 上級
  depth_min_tier: 2                 # E: 守備位置調整
  bunt_shift_min_tier: 5            # B: 守備シフト
  advanced_policy_min_tier: 2       # E: カウント別配球
  inside_policy_min_tier: 5         # B: 内角・釣り球
  gear_min_tier: 4                  # C: ギア先読み
  timeout_min_tier: 2              # E: 伝令運用
