# --- 育成（練習→能力, 設計書02 §5.1） ---
training:
  base_main_exp: 85.0
  sub_factor: 0.4
  facility_coef: 1.0          # 施設レベル0（施設なし）の基準施設係数。facility_tiers で上位を注入（#115）
  # 基準指導力（中立点, #115）。監督メタ（分野別指導力）を注入しないときの既定＝この指導力で従来と1ビット一致。
  # 監督指導力を注入すると 投手系←Coaching.Pitching / 守備・走塁系←Coaching.Defense / 打撃系←Coaching.Batting で駆動。
  coaching_level: 20.0
  coaching_slope: 0.005       # 1+指導力×slope×素直さ。名将(指導力90)→factor≈1.45（設計書02）
  # 個別指導3枠（#126・OPEN-QUESTIONS Q7(a)）: 指名選手の主効果expへ #115のcoachingFactor比を
  # もう一段乗せる。追加倍率=1+(coachingFactor比−1)×bonus_scale。指名なし/coaching未注入なら1.0で従来一致。
  individual_coaching_slots: 3
  individual_coaching_bonus_scale: 1.0
  # 施設レベル→(係数, 週練習時間[分])（#115・設計書03 §4 / 04）。index=施設レベル。Lv0=現状(1.0/300)で従来一致。
  # 資金/名声からレベルを上げる接続は将来（OPEN-QUESTIONS Q6）。現状は SeasonContext.FacilityLevel の注入口のみ。
  # 「豪腕素質×名将＋フル施設(Lv4)で3年+15〜20km/h」が成立するよう据える（out/overnight/issue-115 で実測）。
  facility_tiers:
    - { coef: 1.00, budget_minutes: 300 }   # Lv0 施設なし（現状・従来一致）
    - { coef: 1.35, budget_minutes: 400 }   # Lv1
    - { coef: 1.70, budget_minutes: 500 }   # Lv2
    - { coef: 2.05, budget_minutes: 600 }   # Lv3
    - { coef: 2.40, budget_minutes: 700 }   # Lv4 フル施設（名門・強豪）
  level_up_base: 100.0        # 必要exp = base × growth^level
  level_up_growth: 1.05
  aptitude_required_exp_factor: 0.6   # 守備位置適性は能力より緩い必要exp（<1.0で速く伸びる, 守備適性 未決1）
  # 能力別 trainability（伸ばしやすさ, Issue #114）: 能力の素質の形（内在特性）。exp加算時に乗算する。
  # GrowthMultiplier（分野別の伸びしろ・個体差）や環境倍率（監督指導力・施設 #115）とは直交する。
  # 既定は全1.0で従来と1ビットも変わらない。未指定の能力は1.0。
  # 方針（会話 2026-07-22）: 足=素質固定でフラット／技術系=相対的に伸びやすい／球速=1.0固定（環境が担う）／弾道=触らない。
  # 値はたたき台（要統計回帰校正・出力レポートは out/overnight/issue-114/）。
  trainability:
    speed: 0.4            # 足＝素質固定。ほぼ伸びない（足の速い子／遅い子の手触り）
    # 技術で決まる能力＝相対的に伸びやすい
    fielding: 1.25
    catching: 1.25
    throw_accuracy: 1.25
    discipline: 1.20
    control: 1.20
    pitch_rank: 1.20
    bunt: 1.30
    contact: 1.15
    # 以下は現状維持（1.0固定・明示）: 肩/球速/スタミナ/パワー/盗塁/走塁判断/弾道
    arm_strength: 1.0
    velocity: 1.0        # 球速は素質で伸ばさない。「+20km/h」は環境倍率が担う（#115）
    stamina: 1.0
    power: 1.0
    steal: 1.0
    baserunning: 1.0
    launch_tendency: 1.0 # 型属性（触らない）
  summer_camp_mult: 2.0       # 設計書04 §4
  winter_camp_mult: 2.5
  tournament_practice_mult: 0.5   # 大会モード中は練習効果が落ちる（設計書03/05）。<1.0で低下
  # 練習時間配分（設計書03 §3.1）: 基準週=1メニュー満額の基準、default_budget=施設0の週練習時間
  reference_week_minutes: 300
  default_budget_minutes: 300  # 照明/寮などの施設導入で増やす（設計書03 §4, 今回は口だけ）
  # 実戦成長（設計書02 §5.3a, Q8・2026-07-20）: 精神力/走塁判断/捕手リードは試合出場でのみ伸びる。
  # 1試合出場あたりのexp（成長段階係数を乗算）。必要expは能力値と同じ曲線（100×1.05^v）🟡
  match_mental_exp: 260.0
  match_lead_exp: 400.0        # 捕手として出場した試合のみ
  match_baserunning_exp: 300.0

