  talent_center_default: 32.0
  talent_sd: 8.0
  talent_min: 10.0
  talent_max: 90.0
  # 凸凹配分（総ポイントをランダム重みで配分・偏り自体もばらつく＝金太郎飴回避）
  concentration_mean: 0.35    # 偏り強度σ。大きいほど内訳が凸凹
  concentration_sd: 0.15
  specialty_floor: 14         # 専門能力の下限（「できない」を作らない）
  off_specialty_factor: 0.55  # 専門外能力の中心係数（総合力×これ）。パワプロ型特化を禁止
  off_specialty_floor: 8
  # 運動能力ベースライン（走力・地肩・スタミナ, 名声独立, §1.1b-2）
  physical_mean: 45.0
  physical_sd: 12.0
  # 精神力・統率傾向（設計書02 §3 / 09 §8。才能・身体と独立）
  # 実戦成長ループ接続（Q8・2026-07-20）: 「新入生は未熟（中心46）→3年間の実戦で開花」へ初期分布を引き下げ
  mental_mean: 46.0
  mental_sd: 12.0
  leadership_mean: 50.0
  leadership_sd: 15.0
  # 捕手リード（設計書01 §2①）: 野球脳(Mental)相関＋個体差。中心50不変で統計帯を保つ（不変条件#5）
  lead_mean: 46.0                # Q8: 未熟→捕手出場で伸びる時間アークへ引き下げ（旧50）
  lead_sd: 8.0
  lead_mental_corr: 0.30
  lead_cap_mental_corr: 0.15     # Q8(c): リードcapの野球脳相関（名捕手の天井）
  # 投打の利き（§1.1c）
  throw_left_prob: 0.12
  switch_prob: 0.03
  bat_left_given_right_throw: 0.40   # 右投→左打（右投左打を意図的に量産）
  bat_left_given_left_throw: 0.98    # 左投→ほぼ左打（左投右打は絶滅危惧種）
  # 投手球速 = 地肩 ＋ 投手センス（§1.1b-3。km/h校正は Slice 2D）
  pitcher_sense_bonus: 10.0
  non_pitcher_sense_factor: 0.45
  velocity_arm_weight: 0.5
  velocity_sense_weight: 0.5
  # 伸びしろ（分野別・凸凹, 現在値と独立, §5.1）
  growth_mean: 1.0
  growth_sd: 0.22
  growth_min: 0.5
  growth_max: 1.6
  late_growth_bonus: 0.15
  # 才能上限（凸凹）
  cap_gap_mean: 26.0
  cap_gap_sd: 10.0
  late_cap_bonus: 6.0         # 晩成の才能上限上方補正（設計書02 §5.2）
  # 能力別 才能上限gap圧縮（Issue #114）: 素質固定能力（足）は「伸びる速さ」だけでなく「天井」も近い＝両方きつく。
  # gap（mean/sd）に乗じる。既定1.0で従来一致。cap_gap_mean 26×0.4≈10（＝天井も近い）。逸材は免除。
  speed_cap_gap_factor: 0.4
  # 逸材（隠しフラグ, Issue #114 / Q20）の出現率。素質固定能力の cap 圧縮・trainability 減衰を免除
  # ＝規格外の俊足が稀に出る。既定0.0（逸材なし＝従来一致）。値はたたき台（要実測校正）。
  prodigy_prob: 0.02
  # 隠し属性「投手経歴」（野手の変化球上振れの素, §1.1b）
  pitcher_background_prob: 0.06
  # 変化球レパートリー（設計書02 §2.2）: 投手1〜3球種／野手0〜1（経歴持ちは上振れ）🟡
  pitcher_second_pitch_prob: 0.75
  pitcher_third_pitch_prob: 0.30
  fielder_breaking_prob: 0.35
  background_fielder_extra_prob: 0.60
  pitch_offset_sd: 8.0
  # 守備位置適性の初期分布（設計書01 §1.1, 創発モデル）: 本職は事前に決めず結果として定まる
  aptitude_base_mean: 50.0         # 守備地力の全体水準（高い個体は全ポジ器用になりうる）
  aptitude_base_sd: 14.0
  aptitude_group_affinity_sd: 12.0 # 系統(投/捕/内/外)ごとの向き不向き（独立に振る）
  aptitude_position_noise_sd: 6.0  # 各ポジ個別の個体差
  # 球質タイプ（設計書01 §1.1b / 02 §2）: 投手総合は変えず、球速・制球・スタミナ・キレの配分だけ振り替える。
  # これにより「球速＝投手の良さ」ではなくなり、同じ総合ランクに本格派と技巧派が併存する。
  # オフセットは「実際の試合の失点が型によらず揃う」よう実測で校正（式の加重和ではない）。
  # 実測の限界失点（baseLv68）: 球速 −0.015/Lv・制球 −0.057/Lv・キレ −0.009/Lv。
  # 球速を物理層へ接続して空振り価値を3倍にしたが、制球の失点価値は依然その約4倍あるため
  # 制球の振れ幅は±5程度が中立の上限。本格派は設計書02「球速とキレで押し込む」に沿ってキレを+へ戻した。
  archetype_power_share: 0.25        # 本格派
  archetype_finesse_share: 0.22      # 技巧派
  archetype_soft_toss_share: 0.08    # 軟投派（残りはバランス型）
  archetype_power_velocity: 12
  archetype_power_control: -4
  archetype_power_stamina: -2
  archetype_power_pitch_rank: 2
  archetype_finesse_velocity: -10
  archetype_finesse_control: 3
  archetype_finesse_stamina: 1
  archetype_finesse_pitch_rank: 3
  # 軟投派の上乗せは 2026-07-21（Issue #24）に再校正。打球の塁打数を転がり込みの幾何で
  # 決めるようにした結果、打球初速の低さ（＝転がらない＝長打になりにくい）が以前より価値を持ち、
  # 軟投派だけ失点が下がった（実測 3.65 vs 技巧派 3.96）。キレ+5→+3・制球+4→+3 で実戦中立へ戻す
  # （Archetypes_AreBalanceNeutral_InActualGames）。
  archetype_soft_toss_velocity: -14
  archetype_soft_toss_control: 3
  archetype_soft_toss_stamina: 2
  archetype_soft_toss_pitch_rank: 3
  # 旧フィールド（後方互換）
  init_level_mean: 32.0
  init_level_sd: 8.0
  # 打順編成＋DH使用判断（issue #54, 設計書11 §4「オーダー編成」）。自校・AI校で共有する。
  # 1番=出塁力＋走力、2番=小技・ミート、中軸=打撃総合（最強打者は4番）、6番以降=残りを打撃総合順。
  lineup_leadoff_discipline_weight: 0.45
  lineup_leadoff_contact_weight: 0.30
  lineup_leadoff_speed_weight: 0.25
  lineup_second_contact_weight: 0.55
  lineup_second_bunt_weight: 0.45
  lineup_overall_contact_weight: 0.5
  lineup_overall_power_weight: 0.5
  # DH使用判断: 投手の打撃総合（ミート＋パワー）が野手平均よりこれ以上低ければDHを使う。
  lineup_dh_pitcher_batting_gap: 15.0

# ===== AI校の永続ロスター（設計書 OPEN-QUESTIONS Q19/Q20 · #80/#82）=====
# 他校の選手個人が入学〜引退の3年間在籍し節目成長する（使い捨て生成を廃止）。怪物（Phenom）も同居。
# バランス調整はこのセクションで行う（不変条件#4）。
persistent_roster:
  pitchers_per_cohort: 3        # 各学年の投手数（野手は守備8位置に1人ずつ＝コホート=8+これ）
  freshman_gap: 8.0             # 新入生の能力中心 = Strength − これ（未熟スタート・3年で開花）
  fame_recruit_weight: 0.04     # 名声由来の入学時上振れ（(Fame−50)×これ）
  annual_growth: 6.0            # 逆算配分のベースライン年間成長素点
  senior_growth_factor: 0.4     # 3年（引退間際）の成長係数
  target_tolerance: 3.0         # 逆算配分の許容誤差（翌夏チーム総合 vs 進化後Strength）
  max_residual_per_node: 4.0    # 逆算残差補正の1節目あたり上限
  # 年3節目の分割比（夏大会後 / 秋大会後 / 冬明け）。合計1.0。
  summer_node_share: 0.34
  autumn_node_share: 0.33
  winter_node_share: 0.33
  # 怪物（Phenom）: 全4000校一様・名声重み無し（Q20 §2）。出現率・型比・能力帯はここで調整。
  phenom_spike_rate_per_school_year: 0.00038      # 尖り型 ≒ 全国 期待1.5人/年（年1〜2人/全国, Q20 §3）
  phenom_all_round_rate_per_school_year: 0.00008  # 総合型 ≒ 全国 期待0.32人/年（数年に1人）
  phenom_ace_weight: 1.0        # 剛腕（球速S＋キレ/スタミナ）
  phenom_finesse_weight: 1.0    # 超技巧（制球S＋キレ）
  phenom_slugger_weight: 1.0    # スラッガー（パワーS＋ミート/弾道）
  phenom_speedster_weight: 1.0  # 韋駄天（走力S＋ミート/盗塁/走塁）
  phenom_strong_arm_weight: 1.0 # 鉄砲肩（肩S＋守備/捕球）
  phenom_main_min: 90           # 主軸能力の帯（S帯）
  phenom_main_max: 99
  phenom_support_min: 70        # 支持能力の底上げ帯
  phenom_support_max: 82
  phenom_all_round_min: 82      # 総合型の主要能力帯（S級）
  phenom_all_round_max: 95
